<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vercel Webpage</title>
    <style>
        /* CSS Styles */
        :root {
            --bg-color: #ffffff;
            --text-color: #111111;
            --accent-color: #0070f3;
            --card-bg: #f4f4f4;
        }

        [data-theme="dark"] {
            --bg-color: #0b0b0b;
            --text-color: #ffffff;
            --accent-color: #00dfd8;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.8;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .theme-toggle {
            margin-top: 30px;
            background: none;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello World! 👋</h1>
        <p>This is my brand new webpage hosted on Vercel. It features built-in responsive design and a theme switcher.</p>
        
        <button class="btn" onclick="alert('Thank you for visiting!')">Click Me</button>
        
        <br>
        <button class="theme-toggle" id="themeBtn">Switch to Dark Mode</button>
    </div>

    <script>
        /* JavaScript Code */
        const themeBtn = document.getElementById('themeBtn');
        
        themeBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.textContent = 'Switch to Dark Mode';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.textContent = 'Switch to Light Mode';
            }
        });
    </script>
</body>
</html>
